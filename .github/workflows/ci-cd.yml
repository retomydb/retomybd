# =============================================================================
# retomY — CI/CD Pipeline
# Enterprise GitHub Actions workflow
# =============================================================================
name: retomY CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

permissions:
  contents: read
  packages: write
  security-events: write

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═════════════════════════════════════════════════════════
  # 1. Lint & Type-check Frontend
  # ═════════════════════════════════════════════════════════
  frontend-check:
    name: "Frontend — Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build (verify production build works)
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_APP_NAME: retomY

  # ═════════════════════════════════════════════════════════
  # 2. Lint & Check Backend
  # ═════════════════════════════════════════════════════════
  backend-check:
    name: "Backend — Lint & Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check import validity
        run: python -c "import main; print('✅ main.py imports OK')"
        env:
          MSSQL_HOST: localhost
          MSSQL_PASSWORD: test
          JWT_SECRET_KEY: test-secret

  # ═════════════════════════════════════════════════════════
  # 3. Build & Push Docker Images
  # ═════════════════════════════════════════════════════════
  build-backend:
    name: "Build Backend Image"
    needs: [backend-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-frontend:
    name: "Build Frontend Image"
    needs: [frontend-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_APP_NAME=retomY

  # ═════════════════════════════════════════════════════════
  # 4. Run DB Migrations
  # ═════════════════════════════════════════════════════════
  migrate:
    name: "Run DB Migrations"
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install migration dependencies
        run: |
          pip install pyodbc python-dotenv

      - name: Run migrations
        run: python database/migrate.py
        env:
          MSSQL_HOST: ${{ secrets.MSSQL_HOST }}
          MSSQL_PORT: ${{ secrets.MSSQL_PORT }}
          MSSQL_USER: ${{ secrets.MSSQL_USER }}
          MSSQL_PASSWORD: ${{ secrets.MSSQL_PASSWORD }}
          MSSQL_DATABASE: ${{ secrets.MSSQL_DATABASE }}
          MSSQL_DRIVER: "ODBC Driver 18 for SQL Server"

  # ═════════════════════════════════════════════════════════
  # 5. Deploy (placeholder — customize for your infra)
  # ═════════════════════════════════════════════════════════
  deploy:
    name: "Deploy to Production"
    needs: [migrate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "========================================="
          echo "  retomY Deployment"
          echo "========================================="
          echo "Backend:  ${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo "Commit:   ${{ github.sha }}"
          echo "========================================="
          echo ""
          echo "Images are published to GitHub Container Registry."
          echo "Configure your deployment target below:"
          echo "  - Azure Container Apps"
          echo "  - AWS ECS / Fargate"
          echo "  - Docker Compose on VPS"
          echo "  - Kubernetes"

      # ── Example: Deploy via SSH to a VPS ──────────────

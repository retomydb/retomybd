<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/retomy-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="retomY — Retomy Db. Buy, sell, and discover data at enterprise scale." />
    <meta name="theme-color" content="#171a21" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>retomY — Enterprise Dataset Marketplace</title>
  </head>
  <body class="bg-retomy-bg text-retomy-text antialiased">
    <div id="root">
      <!-- Fallback shown until React mounts (prevents blank dark screen) -->
      <div id="app-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;">
        <svg width="40" height="40" viewBox="0 0 40 40" style="animation:spin 1s linear infinite;">
          <circle cx="20" cy="20" r="16" stroke="#66c0f4" stroke-width="3" fill="none" stroke-dasharray="80" stroke-dashoffset="60" stroke-linecap="round"/>
        </svg>
        <p style="color:#8f98a0;font-family:Inter,sans-serif;font-size:14px;">Loading retomY…</p>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
